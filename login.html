<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Bonsái Monitor</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<!-- PANEL IZQUIERDO -->

<div class="panel-left">

<div class="top">

<img src="img/logo.jpg" class="logo">

<div>
<h1>Bonsái Monitor</h1>
<p>Controla riego y ambiente de tus bonsáis desde cualquier lugar.</p>
</div>

</div>

<div class="image-container">

<img src="img/bonsai.jpg" class="bonsai">

</div>

<div class="features">

<div class="item">
<span class="dot"></span>
Humedad del sustrato al día
</div>

<div class="item">
<span class="dot"></span>
Riego manual y automático
</div>

<div class="item">
<span class="dot"></span>
Alertas por debajo del umbral
</div>

</div>

</div>


<!-- PANEL LOGIN -->

<div class="panel-right">

<div class="login-card">

<h2>Iniciar sesión</h2>

<p class="desc">
Accede para ver el estado de humedad, programar
riegos y revisar alertas.
</p>

<label>Correo electrónico</label>

<input type="email" id="email" placeholder="admin@bonsai.com">

<label>Contraseña</label>

<div class="password">

<input type="password" id="password" placeholder="1234">

<button type="button" class="show" onclick="mostrarPassword()">Mostrar</button>

</div>

<button class="login-btn" onclick="login()">Entrar</button>

</div>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
